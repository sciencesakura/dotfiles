[general]
import = [
  "themes/themes/iceberg.toml",
  "alacritty.local.toml"
]

[window]
padding = { x = 4, y = 0 }
startup_mode = "Maximized"

[scrolling]
multiplier = 1

[selection]
save_to_clipboard = true

[terminal.shell]
program = "bash"
args = ["-l", "-c", "tmux attach-session -t 0 || tmux new-session"]

[keyboard]
bindings = [
  { key = "Slash", mods = "Control", chars = "\u001f" }
]
